name: Build Multiplatform App

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android Release
        run: ./gradlew :androidApp:assembleRelease
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: androidApp/build/outputs/apk/release/*.apk

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Web
        run: |
          ./gradlew :webApp:wasmJsBrowserDistribution
          ./gradlew :webApp:jsBrowserDistribution

      - name: Zip Web Artifacts
        run: zip -r web-dist.zip webApp/build/dist/

      - name: Upload Web Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist.zip

  build-desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build Windows MSI
        run: ./gradlew :desktopApp:packageMsi

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: desktopApp/build/compose/binaries/main/msi/*.msi

  build-desktop-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Linux Deb
        run: ./gradlew :desktopApp:packageDeb

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: desktopApp/build/compose/binaries/main/deb/*.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build macOS DMG
        run: ./gradlew :desktopApp:packageDmg

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: desktopApp/build/compose/binaries/main/dmg/*.dmg

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build iOS Framework
        run: ./gradlew :shared:linkReleaseFrameworkIosArm64

      - name: Zip iOS Framework
        run: |
          cd shared/build/bin/iosArm64/releaseFramework/
          zip -r ../../../../ios-framework.zip *.framework

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: ios-framework.zip

  create-release:
    needs: [build-android, build-web, build-desktop-windows, build-desktop-linux, build-macos, build-ios]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write
    steps:
      - name: Download Android
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: release/android

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: release/windows

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: release/linux

      - name: Download Mac
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: release/macos

      - name: Download Web
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: release/web

      - name: Download iOS
        uses: actions/download-artifact@v4
        with:
          name: ios-framework
          path: release/ios

      - name: Debug files
        run: ls -R release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v1.0.{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || format('Release v1.0.{0}', github.run_number) }}
          generate_release_notes: true
          files: release/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
