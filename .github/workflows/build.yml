name: Build Multiplatform App

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*.*.*" ]

  pull_request:
    branches: [ "main", "master" ]

  workflow_dispatch:

# جلوگیری از دوبار اجرا شدن
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true


jobs:

  # =========================
  # ANDROID
  # =========================
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - run: chmod +x gradlew

      - name: Build Android Release
        run: ./gradlew :androidApp:assembleRelease
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: androidApp/build/outputs/apk/release/*.apk


  # =========================
  # WEB
  # =========================
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - run: chmod +x gradlew

      - name: Build Web
        run: |
          ./gradlew :webApp:wasmJsBrowserDistribution
          ./gradlew :webApp:jsBrowserDistribution

      - name: Zip Web
        run: zip -r web.zip webApp/build/dist/

      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: web.zip


  # =========================
  # WINDOWS
  # =========================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build MSI
        run: ./gradlew :desktopApp:packageMsi

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: desktopApp/build/compose/binaries/main/msi/*.msi


  # =========================
  # LINUX
  # =========================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - run: chmod +x gradlew

      - name: Build DEB
        run: ./gradlew :desktopApp:packageDeb

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: desktopApp/build/compose/binaries/main/deb/*.deb


  # =========================
  # MACOS
  # =========================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - run: chmod +x gradlew

      - name: Build DMG
        run: ./gradlew :desktopApp:packageDmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: desktopApp/build/compose/binaries/main/dmg/*.dmg


  # =========================
  # IOS (framework only)
  # =========================
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - run: chmod +x gradlew

      - name: Build iOS Framework
        run: ./gradlew :shared:linkReleaseFrameworkIosArm64

      - name: Zip iOS
        run: |
          cd shared/build/bin/iosArm64/releaseFramework/
          zip -r ../../../../ios.zip *.framework

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: ios.zip


  # =========================
  # RELEASE (ONLY ON TAG)
  # =========================
  create-release:
    needs:
      - build-android
      - build-web
      - build-windows
      - build-linux
      - build-macos
      - build-ios

    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Show files
        run: find release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: release/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}